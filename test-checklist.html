<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checklist API Diagnostic</title>
  <style>
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
    h1 { color: #569cd6; }
    .step { margin: 12px 0; padding: 10px; border-left: 3px solid #444; }
    .step.ok { border-left-color: #4ec9b0; }
    .step.fail { border-left-color: #f44747; }
    .step.info { border-left-color: #dcdcaa; }
    pre { background: #252526; padding: 10px; overflow-x: auto; max-height: 400px; overflow-y: auto; font-size: 12px; }
    button { background: #0e639c; color: white; border: none; padding: 8px 16px; cursor: pointer; font-size: 14px; margin: 5px; }
    button:hover { background: #1177bb; }
    #log { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>🔍 Checklist API Diagnostic</h1>
  <p>Conversation ID: <strong>67773d2f-8cad-4103-a1da-7cd66e1ff31b</strong></p>
  <p style="color:#dcdcaa;">
    Paste your access token below. To get it: in the <strong>main app</strong> (inside Genesys Cloud), 
    open DevTools console (F12) and run:<br>
    <code style="background:#252526;padding:2px 6px;">copy(sessionStorage.getItem('gc_access_token'))</code><br>
    Then paste here (Ctrl+V):
  </p>
  <input id="tokenInput" type="text" placeholder="Paste access token here…"
    style="width:100%;padding:8px;font-family:monospace;font-size:12px;background:#252526;color:#d4d4d4;border:1px solid #555;">
  <p>
    <button onclick="run()">▶ Run Full Diagnostic</button>
    <button onclick="document.getElementById('log').innerHTML=''">Clear</button>
  </p>
  <div id="log"></div>

  <script type="module">
    const CONV_ID = "67773d2f-8cad-4103-a1da-7cd66e1ff31b";
    const API_BASE = "https://api.mypurecloud.de";

    function getToken() {
      // Try user-pasted token first, then sessionStorage as fallback
      const pasted = document.getElementById("tokenInput").value.trim();
      if (pasted) return pasted;
      return sessionStorage.getItem("gc_access_token");
    }

    function log(cls, title, detail) {
      const el = document.getElementById("log");
      const div = document.createElement("div");
      div.className = `step ${cls}`;
      div.innerHTML = `<strong>${title}</strong>` +
        (detail ? `<pre>${typeof detail === "string" ? detail : JSON.stringify(detail, null, 2)}</pre>` : "");
      el.appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    async function apiCall(label, path) {
      const token = getToken();
      if (!token) { log("fail", label, "No access token in sessionStorage (key: gc_access_token). Open the main app first to authenticate."); return null; }

      log("info", `${label} — ${path}`);
      try {
        const res = await fetch(`${API_BASE}${path}`, {
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        });

        const text = await res.text();
        let json = null;
        try { json = JSON.parse(text); } catch {}

        if (!res.ok) {
          log("fail", `${label} — HTTP ${res.status} ${res.statusText}`, text.substring(0, 2000));
          return { __error: true, status: res.status, statusText: res.statusText, body: text };
        }

        log("ok", `${label} — HTTP ${res.status} OK`, json ?? text);
        return json;
      } catch (err) {
        log("fail", `${label} — Network error`, err.message);
        return null;
      }
    }

    window.run = async function () {
      document.getElementById("log").innerHTML = "";
      log("info", "Starting diagnostic...", `Token present: ${!!getToken()}\nToken (first 20 chars): ${(getToken() || "").substring(0, 20)}...`);

      // Step 1: Verify token works
      log("info", "── Step 1: Verify token with /api/v2/users/me ──");
      const me = await apiCall("Users/Me", "/api/v2/users/me");
      if (!me || me.__error) { log("fail", "Cannot proceed without valid token."); return; }
      log("ok", `Logged in as: ${me.name} (${me.email})`);

      // Step 2: Get full conversation
      log("info", "── Step 2: Get full conversation ──");
      const conv = await apiCall("Get Conversation", `/api/v2/conversations/${CONV_ID}`);
      if (!conv || conv.__error) { log("fail", "Cannot proceed without conversation data."); return; }

      // Step 3: Inspect participants
      log("info", "── Step 3: Inspect participants ──");
      const participants = conv.participants || [];
      log("info", `Total participants: ${participants.length}`);

      for (const p of participants) {
        const comms = (p.communications || []).map(c => `${c.id} (type: ${c.type ?? "?"}, state: ${c.state ?? "?"})`).join("\n    ");
        log("info", `Participant: purpose=${p.purpose}, name=${p.name ?? "?"}, userId=${p.userId ?? "?"}`, `Communications:\n    ${comms || "(none)"}`);
      }

      // Step 4: Collect agent communications
      const agentParts = participants.filter(p => p.purpose === "agent");
      log("info", `Agent participants found: ${agentParts.length}`);

      const allComms = [];
      for (const ap of agentParts) {
        for (const c of (ap.communications || [])) {
          allComms.push({ commId: c.id, type: c.type, state: c.state, participantName: ap.name });
        }
      }
      log("info", `Total agent communications: ${allComms.length}`, allComms);

      if (!allComms.length) {
        log("fail", "No agent communications found — cannot query checklists.");
        return;
      }

      // Step 5: Try checklists on EVERY communication (not just agent)
      log("info", "── Step 5: Try checklist API on ALL communications ──");
      const allParticipantComms = [];
      for (const p of participants) {
        for (const c of (p.communications || [])) {
          allParticipantComms.push({ commId: c.id, type: c.type, purpose: p.purpose, name: p.name });
        }
      }

      for (const { commId, type, purpose, name } of allParticipantComms) {
        const label = `Checklists [${purpose}/${name}/${type}]`;
        const result = await apiCall(label, `/api/v2/conversations/${CONV_ID}/communications/${commId}/agentchecklists`);
        if (result && !result.__error) {
          // Inspect shape
          log("info", `Response type: ${typeof result}, isArray: ${Array.isArray(result)}, keys: ${Object.keys(result || {}).join(", ")}`);
          const entities = Array.isArray(result) ? result : (result?.entities ?? []);
          if (entities.length) {
            log("ok", `✅ FOUND ${entities.length} checklist(s) on comm ${commId} (${purpose}/${name})`);
          }
        }
      }

      // Step 6: Also try the analytics detail for this conversation
      log("info", "── Step 6: Analytics conversation detail ──");
      const analytics = await apiCall("Analytics Detail", `/api/v2/analytics/conversations/${CONV_ID}/details`);

      log("info", "── Diagnostic complete ──");
    };
  </script>
</body>
</html>
