<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Export Download</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .box p { font-size: 1.1rem; margin-bottom: 1.5rem; }
    .box .sub { color: #888; font-size: 0.85rem; margin-top: 1rem; }
    .dl-btn { display: inline-block; padding: 14px 32px; font-size: 1.1rem; font-weight: 600;
              color: #fff; background: #22c55e; border: none; border-radius: 8px;
              cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .dl-btn:hover { background: #16a34a; }
  </style>
</head>
<body>
  <div class="box">
    <p id="msg">Your file is ready</p>
    <a id="dlBtn" class="dl-btn" style="display:none"></a>
    <p class="sub" id="sub"></p>
  </div>
  <script>
    try {
      const hash = location.hash.substring(1);
      const sep = hash.indexOf("|");
      if (!hash || sep < 0) {
        document.getElementById("msg").textContent = "No export data found. Please try again.";
      } else {
        const fileName = decodeURIComponent(hash.substring(0, sep));
        const b64 = hash.substring(sep + 1);

        const raw = atob(b64);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
        const mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
        const blob = new Blob([bytes], { type: mime });
        const url = URL.createObjectURL(blob);

        const btn = document.getElementById("dlBtn");
        btn.href = url;
        btn.download = fileName;
        btn.textContent = "\u2B07 Save " + fileName;
        btn.style.display = "inline-block";

        document.getElementById("msg").textContent = "Click the button to save your file:";
        document.getElementById("sub").textContent = "You can close this tab after downloading.";

        history.replaceState(null, "", location.pathname);
      }
    } catch (err) {
      document.getElementById("msg").textContent = "Download failed: " + err.message;
      console.error("Download helper error:", err);
    }
  </script>
</body>
</html>
