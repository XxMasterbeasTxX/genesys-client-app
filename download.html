<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Downloading…</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .box p { font-size: 1.1rem; }
    .box .sub { color: #888; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="box">
    <p id="msg">Preparing your download…</p>
    <p class="sub">This tab will close automatically.</p>
  </div>
  <script>
    // Read file data from localStorage (written by the iframe app)
    try {
      const b64 = localStorage.getItem("exportData");
      const fileName = localStorage.getItem("exportFileName") || "export.xlsx";

      // Clean up immediately
      localStorage.removeItem("exportData");
      localStorage.removeItem("exportFileName");

      if (!b64) {
        document.getElementById("msg").textContent = "No export data found. Please try again.";
      } else {
        // Decode base64 → Uint8Array
        const raw = atob(b64);
        const bytes = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

        const mime = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";
        const blob = new Blob([bytes], { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();

        document.getElementById("msg").textContent = "Download started: " + fileName;
        setTimeout(() => { URL.revokeObjectURL(url); window.close(); }, 3000);
      }
    } catch (err) {
      document.getElementById("msg").textContent = "Download failed: " + err.message;
      console.error("Download helper error:", err);
    }
  </script>
</body>
</html>
