<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Genesys OAuth Test</title>
</head>
<body>
  <h1>Genesys OAuth Test</h1>

  <p>
    <button id="buildBtn">Build login link</button>
  </p>

  <p>
    <a id="loginLink" href="#" target="_blank" rel="noopener noreferrer">Open Genesys Login</a>
  </p>

  <pre id="debug" style="white-space:pre-wrap;background:#111;color:#0f0;padding:10px;border-radius:6px;"></pre>

  <script>
    const clientId = "3b89b95c-d658-463e-9280-30a5bd7f4c2c";
    const redirectUri = "https://proud-pebble-04fa37b03.2.azurestaticapps.net";
    const region = "mypurecloud.de";

    document.getElementById("buildBtn").addEventListener("click", () => {
      const authUrl =
        `https://login.${region}/oauth/authorize` +
        `?response_type=code` +
        `&client_id=${clientId}` +
        `&redirect_uri=${encodeURIComponent(redirectUri)}` +
        `&code_challenge_method=S256` +
        `&code_challenge=dummy`;

      document.getElementById("loginLink").href = authUrl;
      document.getElementById("debug").textContent = "Auth URL:\n" + authUrl;
    });
  </script>
</body>
</html>
