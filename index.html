<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Genesys OAuth PKCE Test</title>
</head>
<body>
  <h1>Genesys OAuth PKCE Test</h1>

  <p><button id="loginBtn">Login with Genesys (PKCE)</button></p>

  <pre id="debug" style="white-space:pre-wrap;background:#111;color:#0f0;padding:10px;border-radius:6px;"></pre>

  <script>
  const clientId = "3b89b95c-d658-463e-9280-30a5bd7f4c2c";
  const redirectUri = "https://proud-pebble-04fa37b03.2.azurestaticapps.net";
  const region = "mypurecloud.de";

  const tokenUrl = `https://login.${region}/oauth/token`;
  const apiBase = `https://api.${region}`;
  const debugEl = document.getElementById("debug");

  function qp() { return new URLSearchParams(window.location.search); }
  function clearQuery() {
    history.replaceState({}, document.title, location.origin + location.pathname);
  }

  async function exchange(code) {
    const verifier = sessionStorage.getItem("pkce_verifier");
    if (!verifier) throw new Error("Missing pkce_verifier (start login again).");

    const body = new URLSearchParams({
      grant_type: "authorization_code",
      client_id: clientId,
      code,
      redirect_uri: redirectUri,
      code_verifier: verifier
    });

    const r = await fetch(tokenUrl, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body
    });

    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(`Token exchange failed (${r.status}): ${JSON.stringify(j)}`);
    return j;
  }

  async function usersMe(accessToken) {
    const r = await fetch(`${apiBase}/api/v2/users/me`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(`/users/me failed (${r.status}): ${JSON.stringify(j)}`);
    return j;
  }

  (async () => {
    const p = qp();

    if (!p.has("code")) {
      debugEl.textContent = "No code in URL. Click your Login button first.";
      return;
    }

    const code = p.get("code");
    const returnedState = p.get("state") || "";
    const expectedState = sessionStorage.getItem("oauth_state") || "";

    if (!expectedState || returnedState !== expectedState) {
      debugEl.textContent = `State check failed.\nexpected=${expectedState}\nreturned=${returnedState}`;
      return;
    }

    debugEl.textContent = "Exchanging code for token...\n";
    const token = await exchange(code);

    // prevent re-exchanging if you refresh
    clearQuery();

    debugEl.textContent =
      "✅ Token OK\n" +
      `expires_in: ${token.expires_in}\n` +
      `access_token: ${String(token.access_token).slice(0, 30)}...\n\n` +
      "Calling /api/v2/users/me...\n";

    const me = await usersMe(token.access_token);

    debugEl.textContent +=
      "✅ /users/me OK\n\n" +
      JSON.stringify({ id: me.id, name: me.name, email: me.email }, null, 2);
  })();
  </script>
</body>
</html>
